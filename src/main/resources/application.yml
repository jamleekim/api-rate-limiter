spring:
  application:
    name: api-rate-limiter
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:ratelimiter
    driver-class-name: org.h2.Driver

rate-limit:
  enabled: true
  default-algorithm: TOKEN_BUCKET
  default-capacity: 10
  default-refill-rate: 5
  storage-type: IN_MEMORY
